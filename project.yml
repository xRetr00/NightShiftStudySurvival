name: NightShiftStudySurvival
options:
  xcodeVersion: '26.3'
  deploymentTarget:
    iOS: '26.0'
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.local.nightshiftstudysurvival
packages: {}
targets:
  NightShiftStudySurvival:
    type: application
    platform: iOS
    sources:
      - NightShiftStudySurvival
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: NightShift Study Survival
        INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: 'YES'
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: 'YES'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - NightShiftStudySurvivalTests

  NightShiftStudySurvivalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NightShiftStudySurvivalTests
    dependencies:
      - target: NightShiftStudySurvival
